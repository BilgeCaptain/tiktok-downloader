<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Modern İlan Platformu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center">
                    <span class="text-white font-black text-xl">E</span>
                </div>
                <h1 class="text-2xl font-800 tracking-tighter text-gray-900 uppercase">EMRE <span class="text-gray-400">GRG</span></h1>
            </div>
            
            <button onclick="toggleModal()" class="bg-black text-white px-6 py-3 rounded-2xl font-bold hover:bg-gray-800 transition-all shadow-xl shadow-black/10 flex items-center gap-2">
                <i class="fa-solid fa-plus text-sm"></i> İlan Paylaş
            </button>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-4 py-12 text-center">
        <h2 class="text-4xl md:text-5xl font-800 text-gray-900 mb-4 tracking-tight">Aradığın Her Şey Burada.</h2>
        <p class="text-gray-500 text-lg">Emre GRG güvencesiyle ilanlarını özgürce paylaş.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 opacity-40">
            <i class="fa-solid fa-layer-group text-6xl mb-4"></i>
            <p class="text-xl font-semibold">Henüz hiç ilan yok.</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="toggleModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black transition text-2xl">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <h3 class="text-2xl font-bold mb-6 italic text-gray-800 underline decoration-black decoration-4 underline-offset-8">Yeni İlan Oluştur</h3>
            
            <form id="adForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Başlık</label>
                    <input type="text" id="title" placeholder="Örn: 2024 Model iPhone" class="w-full bg-gray-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-black outline-none transition" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Fiyat (TL)</label>
                        <input type="number" id="price" placeholder="50.000" class="w-full bg-gray-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-black outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Resim URL</label>
                        <input type="text" id="img" placeholder="https://..." class="w-full bg-gray-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-black outline-none transition" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Açıklama</label>
                    <textarea id="desc" placeholder="Ürün durumu, garanti vs..." class="w-full bg-gray-50 border-0 p-4 rounded-2xl h-32 focus:ring-2 focus:ring-black outline-none transition resize-none"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-black text-white py-4 rounded-2xl font-bold text-lg hover:bg-gray-800 transition-all shadow-lg">
                    İlanı Yayınla
                </button>
            </form>
        </div>
    </div>

    <script>
        let ads = JSON.parse(localStorage.getItem('emreGrgAds')) || [];

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        function renderAds() {
            const container = document.getElementById('ilanListesi');
            const empty = document.getElementById('emptyState');
            container.innerHTML = '';

            if (ads.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                ads.forEach((ad, index) => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2rem] overflow-hidden border border-gray-100 hover:shadow-2xl transition-all duration-500 group">
                            <div class="relative overflow-hidden h-64">
                                <img src="${ad.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://images.unsplash.com/photo-1560393464-5c69a73c5770?auto=format&fit=crop&q=80&w=500'">
                                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold shadow-sm italic">EMRE GRG EXCLUSIVE</div>
                            </div>
                            <div class="p-6">
                                <h4 class="text-xl font-bold text-gray-900 mb-2 group-hover:text-gray-600 transition">${ad.title}</h4>
                                <p class="text-gray-400 text-sm line-clamp-2 mb-4">${ad.desc}</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-2xl font-black text-black tracking-tight">${Number(ad.price).toLocaleString()} ₺</span>
                                    <button onclick="deleteAd(${index})" class="text-red-400 hover:text-red-600 transition text-sm font-bold">SİL</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        document.getElementById('adForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newAd = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                img: document.getElementById('img').value,
                desc: document.getElementById('desc').value
            };
            ads.unshift(newAd);
            localStorage.setItem('emreGrgAds', JSON.stringify(ads));
            e.target.reset();
            toggleModal();
            renderAds();
        });

        function deleteAd(index) {
            if(confirm('İlan kaldırılsın mı?')) {
                ads.splice(index, 1);
                localStorage.setItem('emreGrgAds', JSON.stringify(ads));
                renderAds();
            }
        }

        renderAds();
    </script>
</body>
</html>
