<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Premium Chat & Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }
        .chat-window { height: 400px; display: flex; flex-direction: column; }
        .message-bubble { max-width: 80%; padding: 10px 15px; border-radius: 20px; margin-bottom: 8px; font-size: 14px; }
        .mine { background: #000; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .theirs { background: #f1f5f9; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center rotate-3 shadow-lg">
                    <span class="text-white font-black text-xl -rotate-3">E</span>
                </div>
                <h1 class="text-2xl font-800 tracking-tighter uppercase italic text-black">EMRE <span class="text-slate-400">GRG</span></h1>
            </div>
            
            <div id="navAuth" class="flex items-center gap-4">
                <button onclick="toggleAuthModal()" id="loginBtn" class="text-slate-600 font-bold px-4 py-2 hover:text-black transition">Giriş</button>
                <div id="userActions" class="hidden flex items-center gap-4">
                    <button onclick="openChatList()" class="relative p-3 bg-slate-100 rounded-full hover:bg-slate-200 transition">
                        <i class="fa-solid fa-comment-dots"></i>
                        <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-white rounded-full"></span>
                    </button>
                    <button onclick="toggleAdModal()" class="bg-black text-white px-6 py-2.5 rounded-2xl font-bold hover:bg-slate-800 transition">İlan Ver</button>
                    <button onclick="logout()" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-power-off"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="chatListModal" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-[300] hidden border-l border-slate-100 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-900 italic uppercase">Mesajlarım</h2>
            <button onclick="document.getElementById('chatListModal').classList.add('hidden')" class="text-slate-400 hover:text-black text-2xl">&times;</button>
        </div>
        <div id="activeChats" class="space-y-4 overflow-y-auto">
            </div>
    </div>

    <div id="chatBox" class="fixed bottom-6 right-6 w-full max-w-sm bg-white rounded-[2rem] shadow-2xl z-[400] hidden flex flex-col border border-slate-100 overflow-hidden">
        <div class="bg-black p-5 text-white flex justify-between items-center">
            <div>
                <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Sohbet Ediliyor</p>
                <h4 id="chatWithName" class="font-bold italic">Kullanıcı</h4>
            </div>
            <button onclick="document.getElementById('chatBox').classList.add('hidden')" class="text-white/50 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="messageDisplay" class="chat-window p-4 overflow-y-auto custom-scroll bg-slate-50">
            </div>
        <div class="p-4 bg-white border-t border-slate-100 flex gap-2">
            <input type="text" id="chatInput" placeholder="Mesajınızı yazın..." class="flex-grow bg-slate-100 p-3 rounded-xl text-sm outline-none focus:ring-1 focus:ring-black">
            <button onclick="sendMessage()" class="bg-black text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-slate-800"><i class="fa-solid fa-paper-plane text-xs"></i></button>
        </div>
    </div>

    <script>
        // FIREBASE AYARLARI BURAYA
        const firebaseConfig = { /* SENİN AYARLARIN */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let user = null;
        let activeRecipientId = null;

        auth.onAuthStateChanged(u => {
            user = u;
            if(u) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userActions').classList.remove('hidden');
            } else {
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('userActions').classList.add('hidden');
            }
            fetchAds();
        });

        // MESAJ GÖNDERME FONKSİYONU
        async function startChat(recipientId, recipientName) {
            if(!user) { toggleAuthModal(); return; }
            if(user.uid === recipientId) { alert("Kendi ilanınıza mesaj atamazsınız."); return; }
            
            activeRecipientId = recipientId;
            document.getElementById('chatWithName').innerText = recipientName;
            document.getElementById('chatBox').classList.remove('hidden');
            loadMessages();
        }

        async function sendMessage() {
            const text = document.getElementById('chatInput').value;
            if(!text || !activeRecipientId) return;

            const chatID = [user.uid, activeRecipientId].sort().join('_');
            await db.collection('messages').add({
                chatID: chatID,
                sender: user.uid,
                text: text,
                at: Date.now()
            });

            document.getElementById('chatInput').value = '';
        }

        function loadMessages() {
            const chatID = [user.uid, activeRecipientId].sort().join('_');
            db.collection('messages').where('chatID', '==', chatID).orderBy('at', 'asc')
              .onSnapshot(snap => {
                  const display = document.getElementById('messageDisplay');
                  display.innerHTML = '';
                  snap.forEach(doc => {
                      const msg = doc.data();
                      const type = msg.sender === user.uid ? 'mine' : 'theirs';
                      display.innerHTML += `<div class="message-bubble ${type}">${msg.text}</div>`;
                  });
                  display.scrollTop = display.scrollHeight;
              });
        }

        // İLANLARI LİSTELEME (SADECE MESAJ BUTONU EKLENDİ)
        async function fetchAds() {
            const snap = await db.collection('ads').orderBy('at', 'desc').get();
            const list = document.getElementById('ilanListesi');
            list.innerHTML = '';
            
            snap.forEach(doc => {
                const ad = doc.data();
                const isMine = user && user.uid === ad.owner;
                list.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] border border-slate-100 overflow-hidden shadow-sm hover:shadow-xl transition-all">
                        <img src="${ad.img}" class="w-full h-56 object-cover">
                        <div class="p-6">
                            <h3 class="font-800 text-lg mb-4 italic uppercase">${ad.title}</h3>
                            <div class="flex justify-between items-center mt-6 pt-4 border-t">
                                <span class="text-xl font-900">${Number(ad.price).toLocaleString()} ₺</span>
                                ${!isMine ? `
                                    <button onclick="startChat('${ad.owner}', 'Satıcı')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-600 transition">Mesaj Gönder</button>
                                ` : `
                                    <button onclick="deleteAd('${doc.id}')" class="text-red-400 text-xs font-bold">İlanımı Sil</button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // DİĞER FONKSİYONLAR (Login, Logout, İlan Ekleme...)
        function logout() { auth.signOut(); location.reload(); }
        function toggleAuthModal() { /* ... */ }
    </script>
</body>
</html>
