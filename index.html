<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Elite Automotive v5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-blue { border: 1px solid rgba(59, 130, 246, 0.4); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .btn-elite { background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); transition: all 0.4s; }
        .btn-elite:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(37, 99, 235, 0.5); }
        .compare-bar { transform: translateY(150%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .compare-bar.active { transform: translateY(0); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
    </style>
</head>
<body class="custom-scroll">

    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-8 h-20 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-2xl rotate-3">
                <span class="text-black font-black text-2xl italic">E</span>
            </div>
            <h1 class="text-xl font-800 tracking-tighter uppercase italic">EMRE <span class="text-blue-500">GRG</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <div id="userMenu" class="hidden flex items-center gap-4">
                <button onclick="toggleAd()" class="btn-elite px-6 py-2.5 rounded-2xl font-bold text-[10px] uppercase tracking-widest">İlan Yayınla</button>
                <button onclick="logout()" class="text-slate-500 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
            </div>
            <button id="guestBtn" onclick="toggleAuth()" class="bg-white text-black px-8 py-2.5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Giriş</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16 min-h-[70vh]">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <div id="compareBar" class="compare-bar fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] glass px-8 py-5 rounded-[2.5rem] flex items-center gap-8 neon-blue">
        <div id="compareSlots" class="flex gap-2"></div>
        <button id="compareActionBtn" onclick="openCompareModal()" class="bg-white text-black px-6 py-2.5 rounded-xl font-black text-[10px] uppercase">Kıyasla</button>
        <button onclick="clearCompare()" class="text-[9px] text-red-500 font-bold uppercase">Temizle</button>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/95 z-[500] hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-xs p-10 rounded-[3rem] text-center">
            <h2 class="text-xl font-black uppercase mb-6 italic">Giriş Yap</h2>
            <input type="email" id="authEmail" placeholder="E-posta" class="w-full bg-white/5 p-4 rounded-2xl mb-4 border border-white/10 outline-none">
            <input type="password" id="authPass" placeholder="Şifre" class="w-full bg-white/5 p-4 rounded-2xl mb-6 border border-white/10 outline-none">
            <button onclick="handleAuth('login')" class="w-full btn-elite py-4 rounded-2xl font-black uppercase mb-2">Giriş</button>
            <button onclick="handleAuth('register')" class="w-full text-slate-500 text-[10px] uppercase font-bold" style="margin-top: 10px;">Hesap Oluştur</button>
            <button onclick="toggleAuth()" class="mt-6 text-slate-700 text-[10px] uppercase">Kapat</button>
        </div>
    </div>

    <div id="adModal" class="fixed inset-0 bg-black/95 z-[400] hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-2xl p-10 rounded-[3rem] overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black italic uppercase mb-8 text-center">Yeni İlan</h3>
            <form id="adForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="title" placeholder="Başlık" class="md:col-span-2 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none" required>
                <input type="text" id="brand" placeholder="Marka Model" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none" required>
                <input type="number" id="price" placeholder="Fiyat" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none" required>
                <input type="number" id="year" placeholder="Yıl" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none" required>
                <input type="number" id="km" placeholder="KM" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none" required>
                <select id="trans" class="bg-black p-4 rounded-2xl border border-white/10 outline-none">
                    <option value="Otomatik">Otomatik</option>
                    <option value="Manuel">Manuel</option>
                </select>
                <input type="text" id="phone" placeholder="Telefon (5xxxxxxxxx)" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none" required>
                <input type="text" id="img" placeholder="Resim URL" class="md:col-span-2 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none" required>
                <button type="submit" class="md:col-span-2 btn-elite py-5 rounded-2xl font-black uppercase mt-4">Yayınla</button>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/98 z-[300] hidden flex items-center justify-center">
        <div class="glass w-full max-w-5xl rounded-[3rem] overflow-hidden flex flex-col md:row relative">
            <button onclick="toggleDetail()" class="absolute top-6 left-6 z-10 w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            <div class="flex flex-col md:flex-row w-full">
                <img id="detailImg" class="w-full md:w-1/2 h-80 md:h-auto object-cover">
                <div class="p-10 flex flex-col justify-center">
                    <h2 id="detailTitle" class="text-3xl font-black uppercase italic mb-2"></h2>
                    <p id="detailPrice" class="text-3xl text-blue-500 font-black mb-8"></p>
                    <div id="detailSpecs" class="grid grid-cols-2 gap-4 mb-8"></div>
                    <a id="whatsappBtn" target="_blank" class="btn-elite text-center py-4 rounded-2xl font-black uppercase">Satıcıyla Görüş</a>
                </div>
            </div>
        </div>
    </div>

    <div id="compareModal" class="fixed inset-0 bg-black/98 z-[600] hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-4xl p-10 rounded-[3rem] overflow-y-auto">
            <button onclick="closeCompareModal()" class="float-right text-white"><i class="fa-solid fa-xmark"></i></button>
            <div id="compareTable" class="grid grid-cols-3 gap-4 mt-10"></div>
        </div>
    </div>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAriFPU7nXOkIbsHT6sN7G5agKwfMtFUH4",
            authDomain: "emre-grg.firebaseapp.com",
            projectId: "emre-grg",
            storageBucket: "emre-grg.firebasestorage.app",
            messagingSenderId: "924579325868",
            appId: "1:924579325868:web:85109542ec09abb394fc09"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allAds = [];
        let compareList = [];
        let currentDetailId = null;

        // MODAL TOGGLES
        const toggleAuth = () => document.getElementById('authModal').classList.toggle('hidden');
        const toggleAd = () => document.getElementById('adModal').classList.toggle('hidden');
        const toggleDetail = () => document.getElementById('detailModal').classList.toggle('hidden');
        const closeCompareModal = () => document.getElementById('compareModal').classList.add('hidden');

        // BU FONKSİYONU SADECE BİR KERE TANIMLIYORUZ
        function openCompareModal() {
            if(compareList.length < 2) return alert("Kıyaslamak için 2 araç seçin.");
            const ad1 = allAds.find(a => a.id === compareList[0]);
            const ad2 = allAds.find(a => a.id === compareList[1]);
            const table = document.getElementById('compareTable');
            
            table.innerHTML = `
                <div class="font-bold text-slate-500 uppercase text-[10px]">Özellik</div>
                <div class="text-center font-bold text-blue-400">${ad1.brand}</div>
                <div class="text-center font-bold text-blue-400">${ad2.brand}</div>
                <div class="border-t border-white/5 py-2 text-[10px]">Fiyat</div>
                <div class="border-t border-white/5 py-2 text-center text-sm italic">₺${Number(ad1.price).toLocaleString()}</div>
                <div class="border-t border-white/5 py-2 text-center text-sm italic">₺${Number(ad2.price).toLocaleString()}</div>
                <div class="border-t border-white/5 py-2 text-[10px]">Yıl</div>
                <div class="border-t border-white/5 py-2 text-center text-sm">${ad1.year}</div>
                <div class="border-t border-white/5 py-2 text-center text-sm">${ad2.year}</div>
                <div class="border-t border-white/5 py-2 text-[10px]">Kilometre</div>
                <div class="border-t border-white/5 py-2 text-center text-sm">${Number(ad1.km).toLocaleString()} km</div>
                <div class="border-t border-white/5 py-2 text-center text-sm">${Number(ad2.km).toLocaleString()} km</div>
            `;
            document.getElementById('compareModal').classList.remove('hidden');
        }

        // AUTH İŞLEMLERİ
        function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if(!email || !pass) return alert("Bilgileri girin.");
            
            if(type === 'register') {
                auth.createUserWithEmailAndPassword(email, pass).then(() => toggleAuth()).catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).then(() => toggleAuth()).catch(e => alert("Giriş başarısız."));
            }
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            document.getElementById('guestBtn').classList.toggle('hidden', !!user);
            document.getElementById('userMenu').classList.toggle('hidden', !user);
            fetchAds();
        });

        // VERİ ÇEKME
        function fetchAds() {
            db.collection("ilanlar").orderBy("createdAt", "desc").onSnapshot(snap => {
                allAds = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAds();
            });
        }

        function renderAds() {
            const list = document.getElementById('ilanListesi');
            list.innerHTML = "";
            allAds.forEach(ad => {
                const inCompare = compareList.includes(ad.id);
                list.innerHTML += `
                    <div class="glass rounded-[3rem] p-3 flex flex-col">
                        <div class="relative h-60 overflow-hidden rounded-[2.5rem] mb-4">
                            <img src="${ad.img}" class="w-full h-full object-cover">
                            <button onclick="toggleCompare(event, '${ad.id}')" class="absolute top-4 right-4 w-10 h-10 glass rounded-xl flex items-center justify-center ${inCompare ? 'bg-blue-600' : ''}">
                                <i class="fa-solid fa-code-compare"></i>
                            </button>
                        </div>
                        <div class="px-4 pb-4">
                            <h3 class="font-bold text-lg mb-4 italic uppercase">${ad.title}</h3>
                            <div class="flex justify-between items-center">
                                <span class="text-xl font-black italic">₺${Number(ad.price).toLocaleString()}</span>
                                <button onclick="showDetail('${ad.id}')" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Detay</button>
                            </div>
                        </div>
                    </div>`;
            });
            updateCompareBar();
        }

        // KIYASLAMA MANTIĞI
        function toggleCompare(e, id) {
            e.stopPropagation();
            const index = compareList.indexOf(id);
            if(index > -1) compareList.splice(index, 1);
            else if(compareList.length < 2) compareList.push(id);
            else return alert("Maksimum 2 araç.");
            renderAds();
        }

        function updateCompareBar() {
            const bar = document.getElementById('compareBar');
            bar.classList.toggle('active', compareList.length > 0);
            document.getElementById('compareSlots').innerHTML = compareList.map(id => {
                const ad = allAds.find(a => a.id === id);
                return `<img src="${ad.img}" class="w-10 h-10 rounded-lg object-cover border border-blue-500">`;
            }).join('');
        }

        function clearCompare() { compareList = []; renderAds(); }

        function showDetail(id) {
            const ad = allAds.find(a => a.id === id);
            document.getElementById('detailImg').src = ad.img;
            document.getElementById('detailTitle').innerText = ad.title;
            document.getElementById('detailPrice').innerText = "₺" + Number(ad.price).toLocaleString();
            document.getElementById('detailSpecs').innerHTML = `
                <div class="glass p-4 rounded-2xl text-center">Yıl: ${ad.year}</div>
                <div class="glass p-4 rounded-2xl text-center">KM: ${ad.km}</div>
            `;
            document.getElementById('whatsappBtn').href = `https://wa.me/90${ad.phone}`;
            toggleDetail();
        }

        // FORM KAYDET
        document.getElementById('adForm').onsubmit = (e) => {
            e.preventDefault();
            db.collection("ilanlar").add({
                title: document.getElementById('title').value,
                brand: document.getElementById('brand').value,
                price: document.getElementById('price').value,
                year: document.getElementById('year').value,
                km: document.getElementById('km').value,
                trans: document.getElementById('trans').value,
                phone: document.getElementById('phone').value,
                img: document.getElementById('img').value,
                createdAt: firebase.firestore.Timestamp.now()
            }).then(() => { toggleAd(); document.getElementById('adForm').reset(); });
        };
    </script>
</body>
</html>
