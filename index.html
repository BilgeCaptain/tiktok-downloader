<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Premium Araç Platformu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .expert-badge { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-black rounded-2xl flex items-center justify-center rotate-3 shadow-lg shadow-black/20">
                    <span class="text-white font-black text-xl -rotate-3">E</span>
                </div>
                <h1 class="text-2xl font-800 tracking-tighter uppercase italic">EMRE <span class="text-slate-400 font-600">GRG</span></h1>
            </div>
            
            <button onclick="toggleModal()" class="bg-black text-white px-8 py-3.5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-xl shadow-black/10 flex items-center gap-2 active:scale-95">
                <i class="fa-solid fa-file-signature text-sm"></i> İlan Yayınla
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>

        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-32 text-slate-300">
            <i class="fa-solid fa-shield-car text-7xl mb-6"></i>
            <p class="text-2xl font-bold italic text-slate-400">Vitrinde araç bulunamadı.</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scroll">
            <button onclick="toggleModal()" class="absolute top-8 right-8 text-slate-400 hover:text-black transition text-2xl">
                <i class="fa-solid fa-circle-xmark"></i>
            </button>
            
            <h3 class="text-3xl font-800 mb-2 text-slate-900 italic uppercase">Araç Kayıt Formu</h3>
            <p class="text-slate-400 mb-8 font-semibold">Lütfen teknik detayları eksiksiz giriniz.</p>
            
            <form id="adForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-800 uppercase text-slate-500 mb-2 px-1 underline underline-offset-4">İlan Başlığı</label>
                        <input type="text" id="title" placeholder="Örn: Hatasız BMW M4" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-black outline-none transition font-semibold" required>
                    </div>
                    <div>
                        <label class="block text-xs font-800 uppercase text-slate-500 mb-2 px-1 underline underline-offset-4">Fiyat (TL)</label>
                        <input type="number" id="price" placeholder="4.500.000" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-black outline-none transition font-bold" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 bg-slate-900 p-6 rounded-[2rem]">
                    <div class="space-y-1">
                        <label class="text-[10px] font-900 text-slate-400 tracking-widest uppercase">Marka</label>
                        <input type="text" id="brand" class="w-full bg-white/10 border-0 p-3 rounded-xl text-white text-sm outline-none focus:ring-1 focus:ring-white" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-900 text-slate-400 tracking-widest uppercase">Yıl</label>
                        <input type="number" id="year" class="w-full bg-white/10 border-0 p-3 rounded-xl text-white text-sm outline-none focus:ring-1 focus:ring-white" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-900 text-slate-400 tracking-widest uppercase">KM</label>
                        <input type="number" id="km" class="w-full bg-white/10 border-0 p-3 rounded-xl text-white text-sm outline-none focus:ring-1 focus:ring-white" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-900 text-slate-400 tracking-widest uppercase">Beygir</label>
                        <input type="number" id="hp" class="w-full bg-white/10 border-0 p-3 rounded-xl text-white text-sm outline-none focus:ring-1 focus:ring-white" required>
                    </div>
                    <div class="space-y-1 col-span-2">
                        <label class="text-[10px] font-900 text-slate-400 tracking-widest uppercase">Model Tam Adı</label>
                        <input type="text" id="modelName" class="w-full bg-white/10 border-0 p-3 rounded-xl text-white text-sm outline-none focus:ring-1 focus:ring-white" required>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-800 uppercase text-slate-500 mb-2 px-1 italic">Görsel URL</label>
                        <input type="text" id="img" placeholder="https://..." class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-black outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-xs font-800 uppercase text-green-600 mb-2 px-1 italic flex items-center gap-2">
                            <i class="fa-solid fa-file-pdf"></i> Ekspertiz Raporu Linki (Opsiyonel)
                        </label>
                        <input type="text" id="expertReport" placeholder="PDF veya Dosya Linki" class="w-full bg-green-50/50 border border-green-200 p-4 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition font-medium">
                    </div>
                </div>

                <button type="submit" class="w-full bg-black text-white py-5 rounded-3xl font-800 text-lg hover:bg-slate-800 transition-all shadow-2xl shadow-black/30 uppercase tracking-[0.2em]">
                    İlanı Onayla ve Paylaş
                </button>
            </form>
        </div>
    </div>

    <script>
        let ads = JSON.parse(localStorage.getItem('emreGrgPro')) || [];

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        function renderAds() {
            const container = document.getElementById('ilanListesi');
            const empty = document.getElementById('emptyState');
            container.innerHTML = '';

            if (ads.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                ads.forEach((ad, index) => {
                    const hasExpert = ad.expertReport && ad.expertReport.trim() !== "";
                    
                    container.innerHTML += `
                        <div class="bg-white rounded-[3rem] overflow-hidden border border-slate-200 hover:shadow-2xl transition-all duration-500 group relative flex flex-col h-full">
                            <div class="relative h-64 overflow-hidden">
                                <img src="${ad.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                ${hasExpert ? `
                                <div class="expert-badge absolute top-6 left-6 text-white text-[10px] font-900 px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                                    <i class="fa-solid fa-shield-check"></i> EKSPERTİZ ONAYLI
                                </div>` : ''}
                                <div class="absolute bottom-4 right-6 bg-white/90 backdrop-blur px-4 py-1.5 rounded-2xl text-[12px] font-900 shadow-sm border border-slate-100">
                                    ${ad.year}
                                </div>
                            </div>

                            <div class="p-8 flex flex-col flex-grow">
                                <div class="mb-4">
                                    <span class="text-[10px] font-900 text-blue-600 uppercase tracking-widest">${ad.brand}</span>
                                    <h3 class="text-xl font-800 text-slate-900 tracking-tight leading-tight">${ad.title}</h3>
                                    <p class="text-slate-400 text-xs font-bold mt-1 uppercase">${ad.modelName}</p>
                                </div>

                                <div class="grid grid-cols-3 gap-2 py-4 border-y border-slate-50 mb-6">
                                    <div class="text-center"><p class="text-[9px] font-black text-slate-300 uppercase">Km</p><p class="text-sm font-800">${Number(ad.km).toLocaleString()}</p></div>
                                    <div class="text-center border-x border-slate-50"><p class="text-[9px] font-black text-slate-300 uppercase">HP</p><p class="text-sm font-800">${ad.hp}</p></div>
                                    <div class="text-center"><p class="text-[9px] font-black text-slate-300 uppercase">Yıl</p><p class="text-sm font-800">${ad.year}</p></div>
                                </div>

                                <div class="mt-auto">
                                    <div class="flex justify-between items-center mb-4">
                                        <span class="text-2xl font-900 text-black tracking-tighter">${Number(ad.price).toLocaleString()} ₺</span>
                                        <button onclick="deleteAd(${index})" class="text-slate-200 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                    
                                    ${hasExpert ? `
                                    <a href="${ad.expertReport}" target="_blank" class="block w-full text-center bg-slate-100 hover:bg-green-600 hover:text-white text-slate-600 py-3 rounded-2xl text-xs font-900 transition-all uppercase tracking-widest">
                                        <i class="fa-solid fa-file-pdf mr-1"></i> Raporu İncele
                                    </a>` : `
                                    <div class="block w-full text-center bg-slate-50 text-slate-300 py-3 rounded-2xl text-xs font-900 uppercase tracking-widest">
                                        Rapor Mevcut Değil
                                    </div>`}
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        document.getElementById('adForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newAd = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                brand: document.getElementById('brand').value,
                modelName: document.getElementById('modelName').value,
                year: document.getElementById('year').value,
                km: document.getElementById('km').value,
                hp: document.getElementById('hp').value,
                img: document.getElementById('img').value,
                expertReport: document.getElementById('expertReport').value
            };
            ads.unshift(newAd);
            localStorage.setItem('emreGrgPro', JSON.stringify(ads));
            e.target.reset();
            toggleModal();
            renderAds();
        });

        function deleteAd(index) {
            if(confirm('İlan vitrinden kaldırılsın mı?')) {
                ads.splice(index, 1);
                localStorage.setItem('emreGrgPro', JSON.stringify(ads));
                renderAds();
            }
        }

        renderAds();
    </script>
</body>
</html>
