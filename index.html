<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Elite Automotive v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-blue { border: 1px solid rgba(59, 130, 246, 0.4); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .btn-elite { background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); transition: all 0.4s; }
        .btn-elite:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(37, 99, 235, 0.5); }
        .compare-bar { transform: translateY(150%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .compare-bar.active { transform: translateY(0); }
        .compare-grid-item { border-right: 1px solid rgba(255,255,255,0.05); }
        .compare-grid-item:last-child { border-right: none; }
    </style>
</head>
<body class="custom-scroll">

    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-8 h-20 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-2xl rotate-3">
                <span class="text-black font-black text-2xl italic">E</span>
            </div>
            <h1 class="text-xl font-800 tracking-tighter uppercase italic">EMRE <span class="text-blue-500">GRG</span></h1>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="userMenu" class="hidden flex items-center gap-4">
                <button onclick="toggleAd()" class="btn-elite px-6 py-2.5 rounded-2xl font-bold text-[10px] uppercase tracking-widest">İlan Yayınla</button>
                <button onclick="logout()" class="text-slate-500 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
            </div>
            <button id="guestBtn" onclick="toggleAuth()" class="bg-white text-black px-8 py-2.5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Giriş</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="compareBar" class="compare-bar fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] glass px-8 py-5 rounded-[2.5rem] flex items-center gap-8 neon-blue">
        <div class="flex items-center gap-4">
            <div id="compareSlots" class="flex gap-2">
                </div>
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Karşılaştırma Listesi</p>
        </div>
        <div class="h-8 w-[1px] bg-white/10"></div>
        <div class="flex gap-3">
            <button onclick="clearCompare()" class="text-[9px] font-bold uppercase text-red-500 hover:text-red-400 transition">Temizle</button>
            <button id="compareActionBtn" onclick="openCompareModal()" class="bg-white text-black px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest disabled:opacity-30">Kıyasla</button>
        </div>
    </div>

    <div id="compareModal" class="fixed inset-0 bg-black/98 backdrop-blur-3xl z-[200] hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-6xl rounded-[4rem] p-10 md:p-16 relative border-white/10 max-h-[90vh] overflow-y-auto">
            <button onclick="closeCompareModal()" class="absolute top-10 right-10 w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-red-500 transition"><i class="fa-solid fa-xmark"></i></button>
            
            <h2 class="text-3xl font-900 uppercase italic mb-12 text-center tracking-tighter">Teknik <span class="text-blue-500">Kıyaslama</span></h2>
            
            <div id="compareTable" class="grid grid-cols-3 gap-0">
                </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/98 backdrop-blur-3xl z-[150] hidden flex items-center justify-center">
        <div class="glass w-full h-full md:max-w-6xl md:h-[85vh] md:rounded-[4rem] overflow-hidden flex flex-col md:flex-row border-white/10">
             <div class="w-full md:w-1/2 bg-black relative">
                <img id="detailImg" class="w-full h-full object-cover opacity-80" src="">
                <button onclick="toggleDetail()" class="absolute top-10 left-10 w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-white hover:text-black transition"><i class="fa-solid fa-chevron-left"></i></button>
            </div>
            <div class="w-full md:w-1/2 p-12 overflow-y-auto custom-scroll flex flex-col">
                <h2 id="detailTitle" class="text-4xl font-900 italic uppercase mb-2"></h2>
                <div id="detailPrice" class="text-4xl font-900 text-blue-500 italic mb-10"></div>
                <div id="detailSpecs" class="grid grid-cols-2 gap-4 mb-10"></div>
                <button onclick="handleCompareFromDetail()" id="detailCompareBtn" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest mb-4 hover:bg-blue-600 transition">Kıyaslama Listesine Ekle</button>
                <a id="whatsappBtn" target="_blank" class="btn-elite text-white py-5 rounded-[2rem] font-black text-center uppercase text-[10px] tracking-widest shadow-2xl">Satış Danışmanına Bağlan</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAriFPU7nXOkIbsHT6sN7G5agKwfMtFUH4",
            authDomain: "emre-grg.firebaseapp.com",
            projectId: "emre-grg",
            storageBucket: "emre-grg.firebasestorage.app",
            messagingSenderId: "924579325868",
            appId: "1:924579325868:web:85109542ec09abb394fc09"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allAds = [];
        let compareList = []; // Maksimum 2 ID tutar
        let currentDetailId = null;

        // Modallar
        const toggleDetail = () => document.getElementById('detailModal').classList.toggle('hidden');
        const openCompareModal = () => document.getElementById('compareModal').classList.remove('hidden');
        const closeCompareModal = () => document.getElementById('compareModal').classList.add('hidden');

        // Veri Çekme
        function fetchAds() {
            db.collection("ilanlar").orderBy("createdAt", "desc").onSnapshot(snap => {
                allAds = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAds();
            });
        }

        function renderAds() {
            const list = document.getElementById('ilanListesi');
            list.innerHTML = "";
            allAds.forEach(ad => {
                const inCompare = compareList.includes(ad.id);
                list.innerHTML += `
                    <div class="glass rounded-[3.5rem] p-3 group hover:neon-blue transition-all duration-700 flex flex-col">
                        <div class="relative h-64 overflow-hidden rounded-[3rem] mb-6">
                            <img src="${ad.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                            <button onclick="toggleCompare(event, '${ad.id}')" class="absolute top-6 right-6 w-10 h-10 glass rounded-xl flex items-center justify-center hover:scale-110 transition ${inCompare ? 'bg-blue-600 border-blue-500' : ''}">
                                <i class="fa-solid fa-code-compare ${inCompare ? 'text-white' : 'text-white/40'}"></i>
                            </button>
                        </div>
                        <div class="px-6 pb-6">
                            <h3 class="font-900 text-xl text-white uppercase italic tracking-tighter mb-4 line-clamp-1">${ad.title}</h3>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-900 text-white italic">₺${Number(ad.price).toLocaleString()}</span>
                                <button onclick="showDetail('${ad.id}')" class="bg-white text-black px-6 py-2 rounded-xl font-black text-[10px] uppercase hover:bg-blue-600 hover:text-white transition">Detay</button>
                            </div>
                        </div>
                    </div>`;
            });
            updateCompareBar();
        }

        // Kıyaslama Mantığı
        function toggleCompare(e, id) {
            if(e) e.stopPropagation();
            const index = compareList.indexOf(id);
            if(index > -1) {
                compareList.splice(index, 1);
            } else {
                if(compareList.length >= 2) return alert("Sadece 2 aracı kıyaslayabilirsiniz.");
                compareList.push(id);
            }
            renderAds();
            updateCompareBar();
        }

        function updateCompareBar() {
            const bar = document.getElementById('compareBar');
            const slots = document.getElementById('compareSlots');
            const actionBtn = document.getElementById('compareActionBtn');
            
            if(compareList.length > 0) {
                bar.classList.add('active');
                slots.innerHTML = compareList.map(id => {
                    const ad = allAds.find(a => a.id === id);
                    return `<div class="w-10 h-10 rounded-xl border border-blue-500/50 overflow-hidden"><img src="${ad.img}" class="w-full h-full object-cover"></div>`;
                }).join('');
                actionBtn.disabled = compareList.length < 2;
                actionBtn.innerText = compareList.length < 2 ? "1 Araç Daha Seç" : "Kıyaslamayı Başlat";
            } else {
                bar.classList.remove('active');
            }
        }

        function clearCompare() {
            compareList = [];
            renderAds();
        }

        function openCompareModal() {
            if(compareList.length < 2) return;
            const ad1 = allAds.find(a => a.id === compareList[0]);
            const ad2 = allAds.find(a => a.id === compareList[1]);
            const table = document.getElementById('compareTable');

            const rows = [
                { label: "Görsel", val1: `<img src="${ad1.img}" class="rounded-3xl h-32 w-full object-cover">`, val2: `<img src="${ad2.img}" class="rounded-3xl h-32 w-full object-cover">` },
                { label: "Marka / Model", val1: ad1.brand, val2: ad2.brand },
                { label: "Model Yılı", val1: ad1.year, val2: ad2.year },
                { label: "Kilometre", val1: Number(ad1.km).toLocaleString() + " km", val2: Number(ad2.km).toLocaleString() + " km" },
                { label: "Vites Tipi", val1: ad1.trans, val2: ad2.trans },
                { label: "Fiyat", val1: "₺" + Number(ad1.price).toLocaleString(), val2: "₺" + Number(ad2.price).toLocaleString() }
            ];

            table.innerHTML = rows.map(row => `
                <div class="p-6 border-b border-white/5 bg-white/[0.01] flex items-center font-black text-[10px] uppercase text-slate-500 tracking-widest">${row.label}</div>
                <div class="p-6 border-b border-white/5 text-center font-bold italic compare-grid-item">${row.val1}</div>
                <div class="p-6 border-b border-white/5 text-center font-bold italic">${row.val2}</div>
            `).join('');

            document.getElementById('compareModal').classList.remove('hidden');
        }

        function closeCompareModal() {
            document.getElementById('compareModal').classList.add('hidden');
        }

        // Detay Göster
        function showDetail(id) {
            currentDetailId = id;
            const ad = allAds.find(a => a.id === id);
            document.getElementById('detailImg').src = ad.img;
            document.getElementById('detailTitle').innerText = ad.title;
            document.getElementById('detailPrice').innerText = "₺" + Number(ad.price).toLocaleString();
            document.getElementById('detailSpecs').innerHTML = `
                <div class="glass p-5 rounded-3xl text-center"><span class="text-[8px] uppercase block text-slate-500 mb-1">Yıl</span><span class="font-bold">${ad.year}</span></div>
                <div class="glass p-5 rounded-3xl text-center"><span class="text-[8px] uppercase block text-slate-500 mb-1">KM</span><span class="font-bold">${Number(ad.km).toLocaleString()}</span></div>
            `;
            document.getElementById('whatsappBtn').href = `https://wa.me/90${ad.phone}?text=${ad.title} için iletişime geçiyorum.`;
            
            const btn = document.getElementById('detailCompareBtn');
            btn.innerText = compareList.includes(id) ? "Kıyaslamadan Çıkar" : "Kıyaslama Listesine Ekle";
            
            toggleDetail();
        }

        function handleCompareFromDetail() {
            toggleCompare(null, currentDetailId);
            const btn = document.getElementById('detailCompareBtn');
            btn.innerText = compareList.includes(currentDetailId) ? "Kıyaslamadan Çıkar" : "Kıyaslama Listesine Ekle";
        }

        // Başlangıç
        auth.onAuthStateChanged(user => {
            document.getElementById('guestBtn').classList.toggle('hidden', !!user);
            document.getElementById('userMenu').classList.toggle('hidden', !user);
            fetchAds();
        });
    </script>
</body>
</html>
