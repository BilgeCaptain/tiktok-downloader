<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Premium Galeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .hidden { display: none !important; }
        .expert-badge { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center shadow-lg shadow-black/20">
                    <span class="text-white font-black text-xl italic">E</span>
                </div>
                <h1 class="text-2xl font-800 tracking-tighter uppercase italic text-black">EMRE <span class="text-slate-400">GRG</span></h1>
            </div>
            
            <div id="navButtons">
                <div id="guestMenu">
                    <button onclick="toggleAuth()" class="bg-black text-white px-6 py-2.5 rounded-2xl font-bold hover:scale-105 transition">Giriş Yap</button>
                </div>
                <div id="userMenu" class="hidden flex items-center gap-4">
                    <button onclick="toggleAd()" class="bg-blue-600 text-white px-6 py-2.5 rounded-2xl font-bold shadow-lg">İlan Ver</button>
                    <button onclick="logout()" class="text-red-500 font-bold ml-2 transition hover:text-red-700">Çıkış</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p id="loading" class="col-span-full text-center text-slate-400 font-medium">İlanlar yükleniyor...</p>
        </div>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h2 class="text-2xl font-900 mb-6 italic uppercase">EMRE GRG PANEL</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-posta" class="w-full bg-slate-50 p-4 rounded-2xl ring-1 ring-slate-200 outline-none focus:ring-black">
                <input type="password" id="password" placeholder="Şifre" class="w-full bg-slate-50 p-4 rounded-2xl ring-1 ring-slate-200 outline-none focus:ring-black">
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="bg-black text-white py-4 rounded-2xl font-bold uppercase text-xs shadow-md">Giriş</button>
                    <button onclick="handleAuth('register')" class="bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold uppercase text-xs">Kayıt Ol</button>
                </div>
                <button onclick="toggleAuth()" class="w-full text-slate-300 text-[10px] uppercase font-black tracking-widest mt-4">Kapat</button>
            </div>
        </div>
    </div>

    <div id="adModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] p-10 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-900 mb-8 italic uppercase border-b pb-4 text-black text-center">Yeni İlan Ekle</h3>
            <form id="adForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="title" placeholder="İlan Başlığı" class="md:col-span-2 bg-slate-50 p-4 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-black" required>
                <input type="number" id="price" placeholder="Fiyat (TL)" class="bg-slate-50 p-4 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-black" required>
                <input type="text" id="brand" placeholder="Marka / Model" class="bg-slate-50 p-4 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-black" required>
                <input type="number" id="year" placeholder="Yıl" class="bg-slate-50 p-4 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-black" required>
                <input type="text" id="img" placeholder="Araç Resim URL'si" class="md:col-span-2 bg-slate-50 p-4 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-black" required>
                <button type="submit" class="md:col-span-2 bg-black text-white py-5 rounded-2xl font-800 uppercase tracking-widest mt-4 shadow-xl hover:bg-slate-900 transition">İlanı Yayınla</button>
                <button type="button" onclick="toggleAd()" class="md:col-span-2 text-slate-400 font-bold text-[10px] uppercase text-center">Vazgeç</button>
            </form>
        </div>
    </div>

    <script>
        // GÜNCEL VE DOĞRU FIREBASE KONFİGÜRASYONU
        const firebaseConfig = {
            apiKey: "AIzaSyAriFPU7nXOkIbsHT6sN7G5agKwfMtFUH4",
            authDomain: "emre-grg.firebaseapp.com",
            projectId: "emre-grg",
            storageBucket: "emre-grg.firebasestorage.app",
            messagingSenderId: "924579325868",
            appId: "1:924579325868:web:85109542ec09abb394fc09"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Modallar için kontrol
        function toggleAuth() { document.getElementById('authModal').classList.toggle('hidden'); }
        function toggleAd() { document.getElementById('adModal').classList.toggle('hidden'); }

        // Giriş ve Kayıt İşlemleri
        function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if(!email || !pass) return alert("Lütfen boşlukları doldur!");

            if(type === 'register') {
                auth.createUserWithEmailAndPassword(email, pass)
                    .then(() => { alert("Başarıyla Kayıt Oldun!"); toggleAuth(); })
                    .catch(err => alert("Kayıt Hatası: " + err.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass)
                    .then(() => { toggleAuth(); })
                    .catch(err => alert("Giriş Hatası: " + err.message));
            }
        }

        function logout() { auth.signOut(); }

        // Kullanıcı Girişini İzle
        auth.onAuthStateChanged(user => {
            const guestMenu = document.getElementById('guestMenu');
            const userMenu = document.getElementById('userMenu');
            
            if(user) {
                guestMenu.classList.add('hidden');
                userMenu.classList.remove('hidden');
            } else {
                guestMenu.classList.remove('hidden');
                userMenu.classList.add('hidden');
            }
            fetchAds(); 
        });

        // Veritabanından İlanları Getir
        function fetchAds() {
            db.collection("ilanlar").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                const list = document.getElementById('ilanListesi');
                list.innerHTML = "";
                
                if(snapshot.empty) {
                    list.innerHTML = "<p class='col-span-full text-center text-slate-400'>Henüz hiç ilan yok.</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100 p-2 group hover:shadow-2xl transition-all duration-500">
                            <div class="relative h-56 overflow-hidden rounded-[2rem]">
                                <img src="${data.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-4 right-4 expert-badge text-white text-[10px] font-black px-3 py-1.5 rounded-full uppercase italic shadow-lg">Eksper Onaylı</div>
                            </div>
                            <div class="p-6">
                                <h3 class="font-800 text-xl text-black mb-1 uppercase italic tracking-tighter">${data.title}</h3>
                                <p class="text-slate-400 text-xs font-bold uppercase mb-4">${data.brand} • ${data.year}</p>
                                <div class="flex justify-between items-center border-t pt-4">
                                    <span class="text-2xl font-900 text-black italic">₺${Number(data.price).toLocaleString()}</span>
                                    <button class="bg-slate-50 text-black px-4 py-2 rounded-xl font-bold text-xs uppercase hover:bg-black hover:text-white transition">İncele</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // Yeni İlan Kaydet
        document.getElementById('adForm').onsubmit = (e) => {
            e.preventDefault();
            const newAd = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                brand: document.getElementById('brand').value,
                year: document.getElementById('year').value,
                img: document.getElementById('img').value,
                createdAt: firebase.firestore.Timestamp.now()
            };

            db.collection("ilanlar").add(newAd).then(() => {
                alert("İlan Yayına Alındı!");
                toggleAd();
                document.getElementById('adForm').reset();
            }).catch(err => alert("Hata: " + err.message));
        };
    </script>
</body>
</html>
