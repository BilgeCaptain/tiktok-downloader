<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Ultimate Automotive Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0B0F1A; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .premium-border { border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-gradient { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); transition: all 0.3s; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px #3B82F6; }
        .fav-active { color: #EF4444 !important; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
    </style>
</head>
<body class="custom-scroll">

    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-6 h-20 flex justify-between items-center">
        <div class="flex items-center gap-3 group cursor-pointer">
            <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)] group-hover:rotate-6 transition-all">
                <span class="text-white font-black text-2xl italic">E</span>
            </div>
            <h1 class="text-2xl font-800 tracking-tighter uppercase italic">EMRE <span class="text-blue-500">GRG</span></h1>
        </div>
        
        <div class="flex items-center gap-6">
            <button onclick="showFavorites()" class="text-slate-400 hover:text-white transition relative">
                <i class="fa-solid fa-heart text-xl"></i>
                <span id="favCount" class="absolute -top-2 -right-2 bg-red-500 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
            <div id="userMenu" class="hidden flex items-center gap-4">
                <button onclick="toggleAd()" class="btn-gradient px-6 py-2.5 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg">İlan Yayınla</button>
                <button onclick="logout()" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-red-500/20 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
            </div>
            <button id="guestBtn" onclick="toggleAuth()" class="bg-white text-black px-6 py-2.5 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-blue-500 hover:text-white transition">Giriş</button>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto px-6 mt-8">
        <div class="glass p-6 rounded-[2.5rem] grid grid-cols-1 md:grid-cols-4 gap-4 items-end border-white/10">
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-black text-slate-500 ml-2">Arama</label>
                <input type="text" id="searchInput" onkeyup="filterAds()" placeholder="Marka, model veya başlık..." class="w-full bg-black/40 border border-white/5 p-3.5 rounded-2xl outline-none focus:border-blue-500 transition text-sm">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-black text-slate-500 ml-2">Fiyat Aralığı (Maks)</label>
                <input type="number" id="filterPrice" onchange="filterAds()" placeholder="Örn: 2.000.000" class="w-full bg-black/40 border border-white/5 p-3.5 rounded-2xl outline-none focus:border-blue-500 transition text-sm">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-black text-slate-500 ml-2">Vites Tipi</label>
                <select id="filterTrans" onchange="filterAds()" class="w-full bg-black/40 border border-white/5 p-3.5 rounded-2xl outline-none text-slate-400 text-sm">
                    <option value="">Hepsi</option>
                    <option value="Otomatik">Otomatik</option>
                    <option value="Manuel">Manuel</option>
                </select>
            </div>
            <button onclick="resetFilters()" class="bg-white/5 hover:bg-white/10 p-3.5 rounded-2xl text-xs font-bold uppercase tracking-widest border border-white/5 transition">Sıfırla</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="adModal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-4xl rounded-[3rem] p-8 md:p-12 shadow-2xl max-h-[90vh] overflow-y-auto custom-scroll border-white/10">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-3xl font-900 italic uppercase">Yeni Koleksiyon Üyesi</h3>
                <button onclick="toggleAd()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            
            <form id="adForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-3 border-b border-white/5 pb-2"><span class="text-blue-500 font-bold text-xs uppercase tracking-widest">1. Temel Bilgiler</span></div>
                <input type="text" id="title" placeholder="İlan Başlığı" class="md:col-span-2 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                <input type="number" id="price" placeholder="Fiyat (TL)" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                
                <input type="text" id="brand" placeholder="Marka (Örn: Mercedes-Benz)" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                <input type="text" id="model" placeholder="Seri / Model (Örn: G63 AMG)" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                <input type="number" id="year" placeholder="Model Yılı" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>

                <div class="md:col-span-3 border-b border-white/5 pb-2 mt-4"><span class="text-blue-500 font-bold text-xs uppercase tracking-widest">2. Teknik Detaylar</span></div>
                <input type="number" id="km" placeholder="Kilometre" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                <input type="number" id="hp" placeholder="Motor Gücü (HP)" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                <input type="number" id="cc" placeholder="Motor Hacmi (cc)" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                
                <select id="transmission" class="bg-[#151b2b] p-4 rounded-2xl border border-white/10 outline-none text-slate-400" required>
                    <option value="" disabled selected>Vites</option>
                    <option value="Otomatik">Otomatik</option>
                    <option value="Yarı Otomatik">Yarı Otomatik</option>
                    <option value="Manuel">Manuel</option>
                </select>
                <select id="fuel" class="bg-[#151b2b] p-4 rounded-2xl border border-white/10 outline-none text-slate-400" required>
                    <option value="" disabled selected>Yakıt</option>
                    <option value="Benzin">Benzin</option>
                    <option value="Dizel">Dizel</option>
                    <option value="Hibrit">Hibrit</option>
                    <option value="Elektrik">Elektrik</option>
                </select>
                <select id="drive" class="bg-[#151b2b] p-4 rounded-2xl border border-white/10 outline-none text-slate-400" required>
                    <option value="" disabled selected>Çekiş</option>
                    <option value="Arkadan İtiş">Arkadan İtiş</option>
                    <option value="Önden Çekiş">Önden Çekiş</option>
                    <option value="4WD (Sürekli)">4WD (Sürekli)</option>
                </select>

                <div class="md:col-span-3 border-b border-white/5 pb-2 mt-4"><span class="text-blue-500 font-bold text-xs uppercase tracking-widest">3. Durum & Ekspertiz</span></div>
                <select id="tramer" class="bg-[#151b2b] p-4 rounded-2xl border border-white/10 outline-none text-slate-400" required>
                    <option value="" disabled selected>Hasar Kaydı (Tramer)</option>
                    <option value="Yok">Yok</option>
                    <option value="Var (Mesaj atınız)">Var (Mesaj atınız)</option>
                    <option value="Ağır Hasarlı">Ağır Hasarlı</option>
                </select>
                <input type="text" id="city" placeholder="Şehir / İlçe" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                <input type="text" id="phone" placeholder="İletişim (5xxxxxxxxx)" class="bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                
                <input type="text" id="img" placeholder="Ana Resim URL" class="md:col-span-3 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500" required>
                <textarea id="description" placeholder="Ekspertiz Durumu ve Açıklama..." class="md:col-span-3 bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500 h-32 resize-none" required></textarea>

                <button type="submit" class="md:col-span-3 btn-gradient py-5 rounded-3xl font-black uppercase tracking-[0.4em] text-sm mt-4 shadow-2xl shadow-blue-500/20">İlanı Yayına Al</button>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/98 backdrop-blur-3xl z-[200] hidden flex items-center justify-center p-0 md:p-6">
        <div class="glass w-full max-w-6xl md:rounded-[4rem] overflow-hidden flex flex-col md:flex-row h-full md:h-[85vh] shadow-2xl border-white/5">
            <div class="w-full md:w-3/5 h-72 md:h-auto relative">
                <img id="detailImg" class="w-full h-full object-cover" src="">
                <button onclick="toggleDetail()" class="absolute top-8 left-8 w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-white hover:text-black transition"><i class="fa-solid fa-arrow-left"></i></button>
            </div>
            <div class="w-full md:w-2/5 p-8 md:p-14 overflow-y-auto custom-scroll">
                <div class="flex justify-between items-start mb-4">
                    <span id="detailCity" class="bg-blue-600/20 text-blue-400 text-[10px] font-black px-4 py-1.5 rounded-full uppercase italic"></span>
                    <button onclick="toggleFavoriteDetail()" id="favBtnDetail" class="text-slate-500 text-xl"><i class="fa-solid fa-heart"></i></button>
                </div>
                <h2 id="detailTitle" class="text-3xl font-900 italic uppercase mb-2 leading-tight"></h2>
                <p id="detailBrandModel" class="text-slate-500 font-bold tracking-widest text-xs uppercase mb-8"></p>
                
                <div class="text-4xl font-900 text-white italic mb-10" id="detailPrice"></div>

                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="bg-white/5 p-5 rounded-[2rem] border border-white/5">
                        <span class="text-[9px] text-slate-500 uppercase font-black block mb-2">Motor Gücü</span>
                        <span id="detailHp" class="text-lg font-bold"></span> <span class="text-xs opacity-50">hp</span>
                    </div>
                    <div class="bg-white/5 p-5 rounded-[2rem] border border-white/5">
                        <span class="text-[9px] text-slate-500 uppercase font-black block mb-2">Kilometre</span>
                        <span id="detailKm" class="text-lg font-bold"></span>
                    </div>
                    <div class="bg-white/5 p-5 rounded-[2rem] border border-white/5">
                        <span class="text-[9px] text-slate-500 uppercase font-black block mb-2">Vites / Yakıt</span>
                        <span id="detailSpecs" class="text-sm font-bold"></span>
                    </div>
                    <div class="bg-white/5 p-5 rounded-[2rem] border border-white/5">
                        <span class="text-[9px] text-slate-500 uppercase font-black block mb-2">Tramer</span>
                        <span id="detailTramer" class="text-sm font-bold"></span>
                    </div>
                </div>

                <div class="mb-10">
                    <span class="text-[10px] text-slate-500 uppercase font-black block mb-4 tracking-widest">Ekspertiz & Açıklama</span>
                    <p id="detailDesc" class="text-slate-400 text-sm leading-relaxed italic"></p>
                </div>

                <a id="whatsappBtn" target="_blank" class="w-full bg-[#25D366] hover:bg-[#20ba59] text-white py-5 rounded-[2rem] font-black uppercase text-xs tracking-widest transition flex items-center justify-center gap-3 shadow-xl shadow-green-500/20">
                    <i class="fa-brands fa-whatsapp text-xl"></i> İletişime Geç
                </a>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/90 backdrop-blur-3xl z-[300] hidden flex items-center justify-center">
        <div class="glass w-full max-w-md rounded-[3rem] p-12 text-center">
            <h2 class="text-3xl font-900 italic uppercase mb-8">GRG LOGIN</h2>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="E-posta" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500">
                <input type="password" id="authPass" placeholder="Şifre" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-blue-500">
                <button onclick="handleAuth('login')" class="w-full btn-gradient py-4 rounded-2xl font-black uppercase text-xs tracking-widest mt-4">Giriş Yap</button>
                <button onclick="handleAuth('register')" class="w-full bg-white/5 py-4 rounded-2xl font-black uppercase text-xs tracking-widest text-slate-400">Kayıt Ol</button>
                <button onclick="toggleAuth()" class="block w-full text-[10px] text-slate-600 uppercase font-black mt-6">Vazgeç</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAriFPU7nXOkIbsHT6sN7G5agKwfMtFUH4",
            authDomain: "emre-grg.firebaseapp.com",
            projectId: "emre-grg",
            storageBucket: "emre-grg.firebasestorage.app",
            messagingSenderId: "924579325868",
            appId: "1:924579325868:web:85109542ec09abb394fc09"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allAds = [];
        let favorites = JSON.parse(localStorage.getItem('grg_favs')) || [];
        let currentDetailId = null;

        // Modallar
        function toggleAd() { document.getElementById('adModal').classList.toggle('hidden'); }
        function toggleAuth() { document.getElementById('authModal').classList.toggle('hidden'); }
        function toggleDetail() { document.getElementById('detailModal').classList.toggle('hidden'); }

        // Auth
        function handleAuth(type) {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if(!email || !pass) return alert("Alanları doldurun.");
            if(type === 'register') {
                auth.createUserWithEmailAndPassword(email, pass).then(() => toggleAuth()).catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).then(() => toggleAuth()).catch(e => alert(e.message));
            }
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            document.getElementById('guestBtn').classList.toggle('hidden', !!user);
            document.getElementById('userMenu').classList.toggle('hidden', !user);
            fetchAds();
        });

        // Veri Çekme
        function fetchAds() {
            db.collection("ilanlar").orderBy("createdAt", "desc").onSnapshot(snap => {
                allAds = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAds(allAds);
                updateFavCount();
            });
        }

        function renderAds(ads) {
            const list = document.getElementById('ilanListesi');
            list.innerHTML = ads.length ? "" : "<p class='col-span-full opacity-20 text-center py-20'>Eşleşen araç bulunamadı.</p>";
            
            ads.forEach(ad => {
                const isFav = favorites.includes(ad.id);
                list.innerHTML += `
                    <div class="glass rounded-[3rem] overflow-hidden p-3 group hover:border-blue-500/50 transition-all duration-500 flex flex-col h-full shadow-xl">
                        <div class="relative h-64 overflow-hidden rounded-[2.5rem] mb-6">
                            <img src="${ad.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                            <button onclick="toggleFav(event, '${ad.id}')" class="absolute top-5 right-5 w-10 h-10 glass rounded-full flex items-center justify-center ${isFav ? 'fav-active' : 'text-white/50'} hover:scale-110 transition">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                            <div class="absolute bottom-5 left-5 bg-black/60 backdrop-blur-md px-4 py-2 rounded-2xl text-[10px] font-black italic shadow-2xl border border-white/5">
                                ${ad.year} • ${Number(ad.km).toLocaleString()} KM
                            </div>
                        </div>
                        <div class="px-6 pb-6 flex flex-col grow">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-800 text-xl text-white uppercase italic tracking-tighter line-clamp-1">${ad.title}</h3>
                            </div>
                            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">${ad.brand} ${ad.model}</p>
                            
                            <div class="mt-auto pt-6 border-t border-white/5 flex justify-between items-center">
                                <span class="text-2xl font-900 text-white italic">₺${Number(ad.price).toLocaleString()}</span>
                                <button onclick="showDetail('${ad.id}')" class="bg-white text-black px-6 py-2.5 rounded-xl font-black text-[10px] uppercase hover:bg-blue-600 hover:text-white transition">Detay</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // Detay Göster
        function showDetail(id) {
            currentDetailId = id;
            const ad = allAds.find(a => a.id === id);
            document.getElementById('detailImg').src = ad.img;
            document.getElementById('detailTitle').innerText = ad.title;
            document.getElementById('detailBrandModel').innerText = `${ad.brand} / ${ad.model}`;
            document.getElementById('detailPrice').innerText = "₺" + Number(ad.price).toLocaleString();
            document.getElementById('detailHp').innerText = ad.hp;
            document.getElementById('detailKm').innerText = Number(ad.km).toLocaleString() + " km";
            document.getElementById('detailSpecs').innerText = `${ad.transmission} / ${ad.fuel} / ${ad.drive}`;
            document.getElementById('detailTramer').innerText = ad.tramer;
            document.getElementById('detailCity').innerText = ad.city;
            document.getElementById('detailDesc').innerText = ad.description;
            document.getElementById('whatsappBtn').href = `https://wa.me/90${ad.phone}?text=${ad.brand} ${ad.model} aracınız için ulaşıyorum.`;
            
            const isFav = favorites.includes(id);
            document.getElementById('favBtnDetail').className = isFav ? 'fav-active text-xl' : 'text-slate-500 text-xl';
            
            toggleDetail();
        }

        // Favori İşlemleri
        function toggleFav(e, id) {
            e.stopPropagation();
            if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('grg_favs', JSON.stringify(favorites));
            renderAds(allAds);
            updateFavCount();
        }

        function toggleFavoriteDetail() {
            if(!currentDetailId) return;
            if(favorites.includes(currentDetailId)) favorites = favorites.filter(f => f !== currentDetailId);
            else favorites.push(currentDetailId);
            localStorage.setItem('grg_favs', JSON.stringify(favorites));
            document.getElementById('favBtnDetail').className = favorites.includes(currentDetailId) ? 'fav-active text-xl' : 'text-slate-500 text-xl';
            renderAds(allAds);
            updateFavCount();
        }

        function updateFavCount() {
            document.getElementById('favCount').innerText = favorites.length;
        }

        function showFavorites() {
            const favAds = allAds.filter(ad => favorites.includes(ad.id));
            renderAds(favAds);
        }

        // Filtreleme
        function filterAds() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const maxPrice = document.getElementById('filterPrice').value;
            const trans = document.getElementById('filterTrans').value;
            
            const filtered = allAds.filter(ad => {
                return (ad.title.toLowerCase().includes(search) || ad.brand.toLowerCase().includes(search)) &&
                       (!maxPrice || Number(ad.price) <= Number(maxPrice)) &&
                       (!trans || ad.transmission === trans);
            });
            renderAds(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('filterPrice').value = "";
            document.getElementById('filterTrans').value = "";
            renderAds(allAds);
        }

        // İlan Kaydet
        document.getElementById('adForm').onsubmit = (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                year: document.getElementById('year').value,
                km: document.getElementById('km').value,
                hp: document.getElementById('hp').value,
                cc: document.getElementById('cc').value,
                transmission: document.getElementById('transmission').value,
                fuel: document.getElementById('fuel').value,
                drive: document.getElementById('drive').value,
                tramer: document.getElementById('tramer').value,
                city: document.getElementById('city').value,
                phone: document.getElementById('phone').value,
                img: document.getElementById('img').value,
                description: document.getElementById('description').value,
                createdAt: firebase.firestore.Timestamp.now()
            };
            db.collection("ilanlar").add(data).then(() => {
                alert("İlanınız lüks koleksiyonumuza başarıyla eklendi!");
                toggleAd();
                document.getElementById('adForm').reset();
            });
        };
    </script>
</body>
</html>
