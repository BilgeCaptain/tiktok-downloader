<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMRE GRG | Güvenli Araç Platformu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="sticky top-0 z-50 bg-white shadow-sm border-b p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center"><span class="text-white font-bold">E</span></div>
                <h1 class="text-xl font-800 uppercase italic">EMRE <span class="text-slate-400">GRG</span></h1>
            </div>
            
            <div id="authButtons" class="flex gap-3">
                <button onclick="showLogin()" class="text-slate-600 font-bold px-4 py-2">Giriş Yap</button>
                <button onclick="toggleModal()" id="addBtn" class="bg-black text-white px-6 py-2 rounded-xl font-bold hidden">İlan Ver</button>
                <button onclick="logout()" id="logoutBtn" class="text-red-500 font-bold hidden">Çıkış</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/50 backdrop-blur shadow-2xl z-[200] hidden flex items-center justify-center">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-center">Giriş Yap / Kayıt Ol</h2>
            <input type="email" id="email" placeholder="E-posta" class="w-full p-4 bg-slate-100 rounded-xl mb-3 outline-none">
            <input type="password" id="password" placeholder="Şifre" class="w-full p-4 bg-slate-100 rounded-xl mb-6 outline-none">
            <button onclick="handleAuth('login')" class="w-full bg-black text-white py-4 rounded-xl font-bold mb-2">Giriş Yap</button>
            <button onclick="handleAuth('register')" class="w-full border border-black py-4 rounded-xl font-bold">Kayıt Ol</button>
            <button onclick="closeAuth()" class="w-full mt-4 text-slate-400 text-sm">Vazgeç</button>
        </div>
    </div>

    <script>
        // --- BURASI ÇOK ÖNEMLİ ---
        // Firebase Konsolundan (firebase.google.com) aldığın bilgileri buraya yapıştır:
        const firebaseConfig = {
            apiKey: "SENİN_API_KEYİN",
            authDomain: "SENİN_DOMAINİN.firebaseapp.com",
            projectId: "SENİN_PROJE_ID",
            storageBucket: "SENİN_BUCKETIN.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // Kullanıcı Durum Takibi
        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('addBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.querySelector('[onclick="showLogin()"]').classList.add('hidden');
            } else {
                document.getElementById('addBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.querySelector('[onclick="showLogin()"]').classList.remove('hidden');
            }
            fetchAds();
        });

        // Giriş ve Kayıt Fonksiyonu
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
                closeAuth();
            } catch (err) { alert("Hata: " + err.message); }
        }

        function logout() { auth.signOut(); }
        function showLogin() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuth() { document.getElementById('authModal').classList.add('hidden'); }

        // İlanları Getir ve SİL butonunu sadece SAHİBİNE göster
        async function fetchAds() {
            const snapshot = await db.collection('ilanlar').orderBy('createdAt', 'desc').get();
            const container = document.getElementById('ilanListesi');
            container.innerHTML = '';
            
            snapshot.forEach(doc => {
                const data = doc.data();
                const isOwner = currentUser && currentUser.uid === data.ownerId;
                
                container.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden border p-6 shadow-sm">
                        <img src="${data.img}" class="w-full h-48 object-cover rounded-xl mb-4">
                        <h3 class="font-bold text-lg">${data.title}</h3>
                        <p class="text-blue-600 font-black text-xl">${data.price} ₺</p>
                        <div class="mt-4 pt-4 border-t flex justify-between items-center">
                            <span class="text-xs text-slate-400 font-bold uppercase">${data.brand}</span>
                            ${isOwner ? `
                                <button onclick="deleteAd('${doc.id}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-500 hover:text-white transition">İLANIMI SİL</button>
                            ` : `
                                <span class="text-[10px] bg-slate-100 px-3 py-1 rounded text-slate-500">İLAN SAHİBİ DEĞİLSİNİZ</span>
                            `}
                        </div>
                    </div>
                `;
            });
        }

        // İlanı Sadece Sahibi Silebilir (Güvenlik Kuralı)
        async function deleteAd(id) {
            if(confirm('İlanını silmek istediğine emin misin?')) {
                await db.collection('ilanlar').doc(id).delete();
                fetchAds();
            }
        }
    </script>
</body>
</html>
